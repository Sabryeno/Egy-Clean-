name: Build Android APK

# Compiles the Flutter app in egy_cleans/ into an installable Android APK.
# GitHub-hosted runners can reach Google's SDK/Maven hosts, so the build that
# is blocked in the sandboxed dev environment succeeds here.

on:
  push:
    branches: [main, flutter-android-app]
    paths: ['egy_cleans/**', '.github/workflows/build-apk.yml']
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: egy_cleans
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

      # Release APK (unsigned by default — installable with "unknown sources").
      - run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: egy-cleans-apk
          path: egy_cleans/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # Also attach the APK to a GitHub Release whenever you push a tag like v1.0.0
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: egy_cleans/build/app/outputs/flutter-apk/app-release.apk
